<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Cyrus's Adventure!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#5c94fc;touch-action:none;}
#game-container{position:fixed;inset:0;}
canvas{display:block;}
#hud{position:fixed;top:10px;left:10px;z-index:100;display:flex;align-items:center;gap:8px;pointer-events:none;}
#health-display{background:rgba(0,0,0,0.45);border-radius:20px;padding:5px 12px;font-size:22px;letter-spacing:2px;}
#score-display{background:rgba(0,0,0,0.45);border-radius:20px;padding:5px 12px;color:#ffe066;font-size:18px;font-weight:bold;font-family:'Courier New',monospace;}
#level-badge{position:fixed;top:10px;right:10px;z-index:100;background:rgba(0,0,0,0.45);border-radius:20px;padding:5px 14px;color:#ffe066;font-size:16px;font-weight:bold;font-family:'Courier New',monospace;}
#controls{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:14px;pointer-events:none;z-index:100;}
.ctrl-btn{border-radius:50%;border:3px solid rgba(255,255,255,0.55);color:white;background:rgba(0,0,0,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none;pointer-events:all;font-family:'Courier New',monospace;font-weight:bold;transition:background 0.08s;-webkit-tap-highlight-color:transparent;}
.ctrl-btn:active,.ctrl-btn.pressed{background:rgba(255,255,255,0.3);}
#btn-left{width:72px;height:72px;font-size:30px;}
#btn-right{width:72px;height:72px;font-size:30px;}
#btn-jump{width:88px;height:88px;background:rgba(220,50,50,0.5);border-color:#ff9090;font-size:15px;}
#btn-water{width:70px;height:70px;background:rgba(30,120,255,0.5);border-color:#80c0ff;font-size:28px;}
#btn-roar{width:70px;height:70px;background:rgba(60,180,60,0.5);border-color:#80ff80;font-size:28px;}
.btn-row{display:flex;gap:8px;pointer-events:all;}
.right-controls{display:flex;flex-direction:column;align-items:flex-end;gap:8px;pointer-events:all;}
#overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);font-family:'Courier New',monospace;}
#overlay h1{font-size:clamp(26px,8vw,56px);color:#ffe066;text-shadow:3px 3px 0 #996600;margin-bottom:10px;text-align:center;line-height:1.2;}
#overlay p{color:#fff;font-size:clamp(13px,3vw,20px);margin-bottom:28px;text-align:center;padding:0 20px;line-height:1.6;}
#play-btn{background:#e03030;color:#fff;border:none;border-radius:18px;padding:18px 48px;font-size:clamp(18px,4vw,28px);font-weight:bold;cursor:pointer;font-family:'Courier New',monospace;box-shadow:0 6px 0 #880000;letter-spacing:1px;-webkit-tap-highlight-color:transparent;}
#play-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #880000;}
#cooldown-water,#cooldown-roar{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.8);font-family:'Courier New',monospace;pointer-events:none;}
</style>
</head>

  <div id="score-display">⭐ 0</div>
</div>
<div id="level-badge">Level 1</div>
<div id="controls">

  </div>
</div>

const MAX_HP = 5;
let hp = MAX_HP, score = 0, currentLevel = 1;
let pGame = null;
let keys = {left:false,right:false,jump:false,water:false,roar:false};

function updateHUD(){
  document.getElementById('health-display').textContent = Array.from({length:MAX_HP},(_,i)=>i<hp?'❤️':'🖤').join('');
  document.getElementById('score-display').textContent = '⭐ '+score;
  document.getElementById('level-badge').textContent = 'Level '+currentLevel;
}

function setupBtn(id,key){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown',e=>{keys[key]=true;el.classList.add('pressed');});
  el.addEventListener('mouseup',e=>{keys[key]=false;el.classList.remove('pressed');});
  el.addEventListener('mouseleave',e=>{keys[key]=false;el.classList.remove('pressed');});
}
['left','right','jump','water','roar'].forEach(k=>setupBtn('btn-'+k,k));

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')keys.left=true;
  if(e.key==='ArrowRight')keys.right=true;
  if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();keys.jump=true;}
  if(e.key==='z'||e.key==='Z')keys.water=true;
  if(e.key==='x'||e.key==='X')keys.roar=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')keys.left=false;
  if(e.key==='ArrowRight')keys.right=false;
  if(e.key===' '||e.key==='ArrowUp')keys.jump=false;
  if(e.key==='z'||e.key==='Z')keys.water=false;
  if(e.key==='x'||e.key==='X')keys.roar=false;
});

document.getElementById('play-btn').onclick=()=>{
  document.getElementById('overlay').style.display='none';
  hp=MAX_HP;score=0;currentLevel=1;updateHUD();
  launchGame(0);
};

function showScreen(title,msg,btnTxt,cb){
  const ov=document.getElementById('overlay');
  ov.innerHTML='<h1>'+title+'</h1><p>'+msg+'</p><button id="play-btn">'+btnTxt+'</button>';
  ov.style.display='flex';
  document.getElementById('play-btn').onclick=()=>{ov.style.display='none';cb();};
}

// Remove background from Cyrus sprite at page load so he appears clean in-game
let CYRUS_NOBG=CYRUS_IMG;
(function(){
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height),px=d.data;
    // Sample all 4 corners to get average background color
    const corners=[0,(c.width-1)*4,(c.height-1)*c.width*4,((c.height-1)*c.width+(c.width-1))*4];
    let br=0,bg=0,bb=0;
    corners.forEach(i=>{br+=px[i]/4;bg+=px[i+1]/4;bb+=px[i+2]/4;});
    for(let i=0;i<px.length;i+=4){
      const dr=px[i]-br,dg=px[i+1]-bg,db=px[i+2]-bb;
      if(Math.sqrt(dr*dr+dg*dg+db*db)<55)px[i+3]=0;
    }
    ctx.putImageData(d,0,0);
    CYRUS_NOBG=c.toDataURL('image/png');
  };
  img.src=CYRUS_IMG;
})();

  pGame=new Phaser.Game({
    type:Phaser.AUTO,

    parent:'game-container',
    backgroundColor:'#5c94fc',
    physics:{default:'arcade',arcade:{gravity:{y:620},debug:false}},
    scene:{preload,create,update}
  });

  let player,platforms,enemies,coins,bullets,flag;
  let facing=1,jumpCD=0,waterCD=0,roarCD=0;
  let playerInv=0,hpRegenT=0;
  let lastSafeX=120,lastSafeY=460;

  function preload(){
    this.textures.addBase64('cyrus',CYRUS_NOBG);
    const bc=document.createElement('canvas');bc.width=1;bc.height=1;
    this.textures.addCanvas('blank',bc);
  }

  function create(){
    const scene=this;
    this.physics.world.setBounds(0,0,ld.worldW,700);

    // Sky
    this.add.rectangle(ld.worldW/2,H/2,ld.worldW,H,0x5c94fc).setScrollFactor(0.1);

    // Clouds
    const cloudG=this.add.graphics().setScrollFactor(0.15);
    cloudG.fillStyle(0xffffff,0.88);
    [[80,70],[280,45],[520,85],[780,55],[1080,80],[1420,60],[1780,100],[2200,50],[2650,80],[3100,65],[3600,90],[4100,55],[4700,75]].forEach(([cx,cy])=>{
      cloudG.fillEllipse(cx,cy,100,48);
      cloudG.fillEllipse(cx+35,cy-16,65,38);
      cloudG.fillEllipse(cx-28,cy-12,58,32);
    });

    // Hills
    const hillG=this.add.graphics().setScrollFactor(0.3);
    hillG.fillStyle(0x48a03a,1);
    [[180,530],[460,540],[760,525],[1100,535],[1480,522],[1850,532],[2260,525],[2700,535],[3200,522],[3700,535],[4200,525]].forEach(([hx,hy])=>{
      hillG.fillEllipse(hx,hy,220,100);
    });

    // Pipes
    const pipeG=this.add.graphics();
    [280,640,1000,1380,1740,2120,2520,2940,3400,3860,4300].forEach(px=>{
      pipeG.fillStyle(0x248a24,1);pipeG.fillRect(px,458,52,82);
      pipeG.fillStyle(0x30aa30,1);pipeG.fillRect(px-7,452,66,20);
      pipeG.fillStyle(0x1a6a1a,1);pipeG.fillRect(px+4,458,8,82);
    });

    // Platforms
    platforms=this.physics.add.staticGroup();
    ld.platforms.forEach(p=>{
      const g=this.add.graphics();
      g.fillStyle(p.c,1);g.fillRect(p.x,p.y,p.w,p.h);
      if(p.h>30){
        g.fillStyle(0x3d9e2d,1);g.fillRect(p.x,p.y,p.w,14);
        g.fillStyle(0x2d7e1d,1);g.fillRect(p.x,p.y+14,p.w,4);
      } else {
        g.fillStyle(0xffcc44,0.5);g.fillRect(p.x,p.y,p.w,8);
      }
      if(p.w>80){
        g.lineStyle(1,0x000000,0.12);
        for(let bx=p.x;bx<p.x+p.w;bx+=40)g.lineBetween(bx,p.y,bx,p.y+p.h);
        for(let by=p.y;by<p.y+p.h;by+=20)g.lineBetween(p.x,by,p.x+p.w,by);
      }
      const pl=scene.add.zone(p.x+p.w/2,p.y+p.h/2,p.w,p.h);
      scene.physics.add.existing(pl,true);
      platforms.add(pl);
    });

    // Coins
    coins=this.physics.add.staticGroup();
    ld.coins.forEach(c=>{
      const cg=this.add.graphics();
      cg.fillStyle(0xffee00,1);cg.fillCircle(c.x,c.y,11);
      cg.fillStyle(0xffaa00,1);cg.fillCircle(c.x,c.y,7);
      cg.fillStyle(0xffee88,1);cg.fillCircle(c.x-3,c.y-3,3);
      const coin=scene.add.zone(c.x,c.y,22,22);
      scene.physics.add.existing(coin,true);
      coin._g=cg;
      coins.add(coin);
    });

    // Flag
    const fg=this.add.graphics();
    fg.fillStyle(0xcccccc,1);fg.fillRect(ld.flagX,375,7,165);
    fg.fillStyle(0xff2222,1);fg.fillTriangle(ld.flagX+7,375,ld.flagX+68,398,ld.flagX+7,422);
    fg.fillStyle(0xffee00,0.9);fg.fillCircle(ld.flagX+3,540,14);
    flag=this.add.zone(ld.flagX+35,455,80,190);
    this.physics.add.existing(flag,true);

    // Player using real Cyrus photo
    player=this.physics.add.image(120,460,'cyrus');
    player.setScale(1.0);
    player.setCollideWorldBounds(false);
    player.body.setSize(55,92).setOffset(9,4);
    player.setDepth(10);
    // If addBase64 hasn't finished yet, swap texture in once it's ready
    const onTexAdd=(key)=>{if(key==='cyrus'&&player&&player.active){player.setTexture('cyrus');player.setScale(1.0);scene.textures.off('addtexture',onTexAdd);}};
    if(!scene.textures.exists('cyrus'))scene.textures.on('addtexture',onTexAdd);

    bullets=this.physics.add.group();

    // Enemies
    enemies=this.physics.add.group();
    ld.enemies.forEach(e=>{
      const eg=this.make.graphics({x:0,y:0,add:false});
      if(e.t==='tarantula'){
        eg.fillStyle(0x1a0a00,1);eg.fillEllipse(22,14,32,20);
        eg.fillStyle(0x3d2810,1);eg.fillEllipse(22,24,24,16);
        [[-16,8],[-12,16],[12,16],[16,8],[-18,12],[18,12],[-14,20],[14,20]].forEach(([lx,ly])=>{
          eg.lineStyle(2.5,0x1a0a00,1);eg.lineBetween(22,18,22+lx,ly);
        });
        eg.fillStyle(0xff2200,1);eg.fillCircle(16,10,3.5);eg.fillCircle(28,10,3.5);
        eg.fillStyle(0xffffff,0.8);eg.fillCircle(16,9,1.5);eg.fillCircle(28,9,1.5);
      } else if(e.t==='centipede'){
        for(let s=0;s<5;s++){
          eg.fillStyle(s%2===0?0xdd4400:0xbb3300,1);
          eg.fillEllipse(6+s*9,18,13,11);
        }
        eg.fillStyle(0xff5500,1);eg.fillCircle(4,18,9);
        eg.fillStyle(0xffff00,1);eg.fillCircle(1,15,3);eg.fillCircle(1,21,3);
        eg.lineStyle(1.5,0x881100,1);
        for(let s=0;s<5;s++){
          eg.lineBetween(6+s*9,13,6+s*9-3,7);
          eg.lineBetween(6+s*9,23,6+s*9+3,29);
        }
      } else {
        eg.fillStyle(0x7a3a10,1);eg.fillEllipse(18,20,30,28);
        eg.fillStyle(0xf4c27a,1);eg.fillEllipse(18,13,20,16);
        eg.fillStyle(0x2c1a0e,1);eg.fillCircle(13,12,3.5);eg.fillCircle(23,12,3.5);
        eg.fillStyle(0x7a3a10,1);eg.fillEllipse(9,7,13,11);eg.fillEllipse(27,7,13,11);
        eg.fillStyle(0xff0000,0.6);eg.fillCircle(13,12,1.5);eg.fillCircle(23,12,1.5);
      }
      const ekey='e_'+e.t;
      if(!scene.textures.exists(ekey))eg.generateTexture(ekey,44,36);
      eg.destroy();
      const spd=e.t==='centipede'?85:e.t==='goomba'?55:48;
      const en=enemies.create(e.x,e.y,ekey);
      en.setVelocityX(-spd);
      en.enemyType=e.t;
      en.speed=spd;
      en.hitCount=0;
      en.roarHit=false;
      en.setGravityY(0);
      en.setDepth(8);
    });

    // Colliders
    this.physics.add.collider(player,platforms);
    this.physics.add.collider(enemies,platforms,(en)=>{
      if(en.body.blocked.left)en.setVelocityX(en.speed);
      else if(en.body.blocked.right)en.setVelocityX(-en.speed);
    });
    this.physics.add.collider(bullets,platforms,b=>b.destroy());

    this.physics.add.overlap(player,coins,(p,coin)=>{
      coin._g&&coin._g.destroy();
      coin.destroy();
      score+=10;updateHUD();
      const t=scene.add.text(p.x,p.y-20,'+10',{fontSize:'20px',color:'#ffee00',fontFamily:'Courier New',fontStyle:'bold',stroke:'#886600',strokeThickness:3});
      t.setDepth(20);
      scene.tweens.add({targets:t,y:t.y-36,alpha:0,duration:650,onComplete:()=>t.destroy()});
    });

    this.physics.add.overlap(bullets,enemies,(b,en)=>{
      b.destroy();
      defeatEnemy(scene,en);
    });

    this.physics.add.overlap(player,enemies,(p,en)=>{
      if(playerInv>0)return;
      if(p.body.velocity.y>80&&p.y<en.y-12){
        defeatEnemy(scene,en);
        p.setVelocityY(-400);
        return;
      }
      en.hitCount=(en.hitCount||0)+1;
      if(en.hitCount>=3){explodeEnemy(scene,en);return;}
      hp=Math.max(0,hp-1);updateHUD();
      playerInv=110;
      scene.tweens.add({targets:player,alpha:0.25,yoyo:true,repeat:5,duration:90,onComplete:()=>player.setAlpha(1)});
      if(hp<=0){
        showScreen('💔 Try Again!','Cyrus is taking a break!<br>He can do it!','▶ Try Again!',()=>launchGame(currentLevel-1));
        if(pGame){pGame.destroy(true);pGame=null;}
      }
    });

    this.physics.add.overlap(player,flag,()=>{
      if(currentLevel<3){
        showScreen('⭐ AMAZING!','Level '+currentLevel+' complete!<br><br>Cyrus is a SUPERSTAR! 🌟','▶ Next Level!',()=>launchGame(currentLevel));
      } else {
        showScreen('🎉 YOU WIN!','Cyrus beat ALL 3 levels!<br><br>CYRUS IS THE CHAMPION! 🏆🎊','▶ Play Again!',()=>{hp=MAX_HP;score=0;currentLevel=1;updateHUD();launchGame(0);});
      }
      if(pGame){pGame.destroy(true);pGame=null;}
    });

    this.cameras.main.setBounds(0,0,ld.worldW,700);
    this.cameras.main.startFollow(player,true,0.1,0.1);
  }

  function defeatEnemy(scene,en){
    explodeEnemy(scene,en);
    score+=(en.enemyType==='goomba'?20:en.enemyType==='centipede'?30:25);
    updateHUD();
  }

  function explodeEnemy(scene,en){
    if(!en.active)return;
    const ex=en.x,ey=en.y;
    en.destroy();
    ['💥','✨','⭐','🌟','💫'].forEach((em,i)=>{
      const t=scene.add.text(ex+(Math.random()-0.5)*50,ey+(Math.random()-0.5)*35,em,{fontSize:'24px'});
      t.setDepth(20);
      scene.tweens.add({targets:t,y:t.y-55,x:t.x+(Math.random()-0.5)*60,alpha:0,duration:750,onComplete:()=>t.destroy()});
    });
  }

  function update(time,delta){
    if(!player||!player.active)return;
    const dt=delta/1000;
    playerInv=Math.max(0,playerInv-1);
    jumpCD=Math.max(0,jumpCD-1);
    waterCD=Math.max(0,waterCD-1);
    roarCD=Math.max(0,roarCD-1);

    hpRegenT+=dt;
    if(hpRegenT>3.5&&hp<MAX_HP){hp=Math.min(MAX_HP,hp+1);updateHUD();hpRegenT=0;}

    const onGround=player.body.blocked.down;
    if(onGround){lastSafeX=player.x;lastSafeY=player.y;}

    if(keys.left){player.setVelocityX(-210);facing=-1;player.setFlipX(true);}
    else if(keys.right){player.setVelocityX(210);facing=1;player.setFlipX(false);}
    else {player.setVelocityX(player.body.velocity.x*0.78);}

    if(keys.jump&&onGround&&jumpCD<=0){
      player.setVelocityY(-560);
      jumpCD=22;
    }

    if(keys.water&&waterCD<=0){
      waterCD=22;
      const scene=pGame.scene.scenes[0];
      const wg=scene.add.graphics();
      wg.fillStyle(0x44aaff,1);wg.fillCircle(0,0,9);
      wg.fillStyle(0xaaddff,0.8);wg.fillCircle(0,0,5);
      const bTex='bullet_tex';
      if(!scene.textures.exists(bTex)){
        const bg=scene.make.graphics({x:0,y:0,add:false});
        bg.fillStyle(0x44aaff,1);bg.fillEllipse(10,7,20,14);
        bg.fillStyle(0xaaddff,0.8);bg.fillEllipse(10,7,12,8);
        bg.generateTexture(bTex,20,14);
        bg.destroy();
      }
      wg.destroy();
      const b=pGame.scene.scenes[0].physics.add.image(player.x+facing*26,player.y-5,bTex);
      b.setVelocityX(facing*550);
      b.setGravityY(-620);
      b.setDepth(9);
      bullets.add(b);
      scene.time.delayedCall(400,()=>{if(b.active)b.destroy();});
      const wt=scene.add.text(player.x,player.y-34,'💧',{fontSize:'22px'});
      wt.setDepth(20);
      scene.tweens.add({targets:wt,x:wt.x+facing*48,alpha:0,duration:320,onComplete:()=>wt.destroy()});
    }

    if(keys.roar&&roarCD<=0){
      roarCD=50;
      const scene=pGame.scene.scenes[0];
      const rt=scene.add.text(player.x,player.y-28,'🦕 ROAAR!',{fontSize:'24px',fontFamily:'Courier New',fontStyle:'bold',color:'#88ff44',stroke:'#224400',strokeThickness:3});
      rt.setDepth(20);
      scene.tweens.add({targets:rt,y:rt.y-48,alpha:0,scaleX:1.6,scaleY:1.6,duration:650,onComplete:()=>rt.destroy()});
      // Check distance to each enemy directly — no zone/physics needed, no freeze
      enemies.getChildren().forEach(en=>{
        if(!en.active||en.roarHit)return;
        const dx=en.x-player.x,dy=en.y-player.y;
        if(Math.abs(dx)<220&&Math.abs(dy)<160){en.roarHit=true;defeatEnemy(scene,en);}
      });
      scene.time.delayedCall(350,()=>{enemies.getChildren().forEach(e=>{e.roarHit=false;});});
      const cir=scene.add.graphics();
      cir.lineStyle(5,0x88ff44,1);cir.strokeCircle(player.x,player.y,20);
      cir.setDepth(9);
      scene.tweens.add({targets:cir,scaleX:6,scaleY:6,alpha:0,duration:450,onComplete:()=>cir.destroy()});
    }

    enemies.getChildren().forEach(en=>{
      if(!en.active)return;
      if(en.body.blocked.left)en.setVelocityX(en.speed);
      else if(en.body.blocked.right)en.setVelocityX(-en.speed);
      if(en.x<40)en.setVelocityX(en.speed);
      if(en.x>ld.worldW-40)en.setVelocityX(-en.speed);
    });

    if(player.y>680){
      player.setPosition(lastSafeX,lastSafeY-60);
      player.setVelocity(0,0);
    }
  }
}
</script>
</body>
</html>
